<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus Add-On Project </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
</head>

<body>
        <select id="city">
            <option value="Europe/Paris"> Paris 🇫🇷</option>
            <option value="Australia/Sydney"> Sydney 🇦🇺</option>
            <option value="Asia/Tokyo"> Tokyo 🇯🇵</option>
        </select>

    <script>
        function showDate(event) {
            if (event.target.value.lenth > 0) {
                let currentTime = moment().tz(event.target.value).format("dddd, MMMM Do, YYYY h:mm: A");
                
                alert(`It is ${currentTime} in ${event.target.value}`);
            }
        }

        let selectElement = document.querySelector("#city");
        selectElement.addEventListener("change", showDate);
    </script>
</body>

</html>
